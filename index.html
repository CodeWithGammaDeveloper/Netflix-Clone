<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Filters</title>
    <style>
        .container {
            height: 100vhpx;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        img {
            height: 500px;
            width: 500px;
            
        }
        .img2{
            filter: brightness(200%);
        }
        .img3{
            filter: opacity(0.1);
        }
        
    </style>
</head>

<body>
    <div class="container">

        <img class="img1" src="https://cdn.pixabay.com/photo/2026/05/27/19/32/19-32-17-86_1280.jpg" alt="">
        <img class="img2" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTy4V0h-8Onp7M_AmjimF67MUknpjcjDgXGLA&s" alt="">
        <img class="img3" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSWcB4SkQKTze6EbVI1i5Kbwn05hjKk-nr-0g&s" alt="">
    </div>
</body>

</html>
